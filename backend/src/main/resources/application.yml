server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:smartshipdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  # Base64 de: smartship-secret-key-for-jwt-authentication-2024 (48 bytes = 384 bits)
  secret: c21hcnRzaGlwLXNlY3JldC1rZXktZm9yLWp3dC1hdXRoZW50aWNhdGlvbi0yMDI0
  expiration: 86400000 # 24 horas en milisegundos

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
